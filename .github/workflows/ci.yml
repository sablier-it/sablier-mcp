name: CI/CD

on:
  push:
    branches: [dev, main]

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and verify package builds
        run: pip install --no-cache-dir .

      - name: Verify entry point
        run: python -c "from sablier_mcp.server import main; print('OK')"

  deploy-staging:
    needs: build-check
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/215397666394/locations/global/workloadIdentityPools/github/providers/github-actions'
          service_account: 'github-actions@sablier-ai.iam.gserviceaccount.com'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to staging
        run: bash deploy_staging.sh

  deploy-production:
    needs: build-check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/215397666394/locations/global/workloadIdentityPools/github/providers/github-actions'
          service_account: 'github-actions@sablier-ai.iam.gserviceaccount.com'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to production
        run: bash deploy.sh

  publish-pypi:
    needs: build-check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true  # Don't fail CI if version already exists on PyPI
